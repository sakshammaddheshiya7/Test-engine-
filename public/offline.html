<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | RankForge Prep</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at 20% 10%, rgba(251, 191, 36, 0.24), transparent 40%), #f6efe4;
        color: #18181b;
      }

      .box {
        width: min(90vw, 420px);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.8);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(8px);
        box-shadow: 0 16px 48px rgba(15, 23, 42, 0.12);
        padding: 24px;
      }

      h1 {
        margin: 0;
        font-size: 1.3rem;
      }

      p {
        margin: 8px 0 0;
        color: #52525b;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main class="box">
      <h1>You're offline</h1>
      <p>RankForge will sync automatically when your internet is back. You can still open cached pages and continue revision.</p>
    </main>
  </body>
</html>
